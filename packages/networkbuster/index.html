<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetworkBuster</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f172a; color: #f8fafc; }
      .app { width: min(100%, 640px); padding: 2rem; border-radius: 1rem; background: rgba(15, 23, 42, 0.92); box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35); }
      input, button { width: 100%; padding: 0.9rem 1rem; border: none; border-radius: 0.75rem; font-size: 1rem; }
      input { margin-bottom: 1rem; background: #111827; color: #f8fafc; }
      button { background: #2563eb; color: white; cursor: pointer; }
      button:hover { background: #1d4ed8; }
      .result { margin-top: 1rem; padding: 1rem; background: #111827; border-radius: 0.75rem; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <div id="app" class="app"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
